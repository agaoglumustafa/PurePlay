<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurePlay | Digital Game Vault</title>
    <style>
        :root { --main-color: #00ff88; --bg-dark: #0f0f0f; --card-bg: #1f1f1f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; padding-bottom: 50px; }
        
        /* Navigasyon ve Menü */
        nav { background: #1a1a1a; padding: 15px 5%; border-bottom: 2px solid var(--main-color); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--main-color); font-size: 1.5rem; font-weight: bold; text-decoration: none; letter-spacing: 2px; }
        .menu { display: flex; gap: 20px; }
        .menu a { color: #aaa; text-decoration: none; font-size: 0.9rem; transition: 0.3s; cursor: pointer; }
        .menu a:hover, .menu a.active { color: var(--main-color); }

        /* Ana Ekran (Liste) */
        .container { display: flex; justify-content: center; flex-wrap: wrap; gap: 25px; padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        .game-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; width: 280px; cursor: pointer; transition: 0.3s; border: 1px solid #333; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--main-color); }
        .game-img { width: 100%; height: 160px; object-fit: cover; }
        .game-info { padding: 15px; text-align: left; }
        .game-info h3 { margin: 0; font-size: 1.1rem; }
        .category-tag { font-size: 0.7rem; color: var(--main-color); font-weight: bold; }

        /* Detay Sayfası (Gizli) */
        #details-page { display: none; padding: 40px 10%; max-width: 1000px; margin: 0 auto; text-align: left; }
        .back-btn { background: #333; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; display: inline-block; margin-bottom: 20px; }
        .details-flex { display: flex; gap: 40px; flex-wrap: wrap; }
        .details-img { width: 400px; border-radius: 10px; border: 1px solid #444; }
        .details-content { flex: 1; min-width: 300px; }
        .download-box { background: #252525; padding: 20px; border-radius: 10px; margin-top: 20px; border-left: 4px solid var(--main-color); }
        .main-dl-btn { background: var(--main-color); color: black; padding: 15px 30px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block; margin-top: 10px; }

        footer { text-align: center; margin-top: 50px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo" onclick="showHome()">PUREPLAY</a>
        <div class="menu">
            <a onclick="filterGames('All')" class="active">All</a>
            <a onclick="filterGames('Simulation')">Simulation</a>
            <a onclick="filterGames('Action')">Action</a>
            <a onclick="filterGames('RPG')">RPG</a>
        </div>
    </nav>

    <!-- ANA LİSTE EKRANI -->
    <div id="home-page">
        <div class="container" id="game-container">
            <!-- Oyunlar buraya JS ile dolacak -->
        </div>
    </div>

    <!-- DETAY EKRANI -->
    <div id="details-page">
        <div class="back-btn" onclick="showHome()">← Back to Games</div>
        <div id="details-render"></div>
    </div>

    <footer><p>&copy; 2026 PurePlay Vault.</p></footer>

    <script>
        // Oyun Veri Bankası
        const games = [
            {
                id: 'omsi2',
                title: 'OMSI 2: Steam Edition',
                category: 'Simulation',
                img: 'https://steamrip.com/wp-content/uploads/2021/08/omsi-2-free-download-preinstalled-steamrip.jpg',
                desc: 'OMSI 2 is the successor to the world-famous and awarded omnibus simulator. It offers a lot of new features, such as new lines, improved AI, and a much larger world to explore.',
                link: 'https://steamrip.com/omsi-2-steam-edition-free-download-k1/',
                downloads: '1,248'
            },
            // İleride buraya yeni oyun objeleri ekleyebilirsin
        ];

        function renderGames(filter = 'All') {
            const container = document.getElementById('game-container');
            container.innerHTML = '';
            
            const filtered = filter === 'All' ? games : games.filter(g => g.category === filter);
            
            filtered.forEach(game => {
                container.innerHTML += `
                    <div class="game-card" onclick="showDetails('${game.id}')">
                        <img src="${game.img}" class="game-img">
                        <div class="game-info">
                            <span class="category-tag">${game.category}</span>
                            <h3>${game.title}</h3>
                        </div>
                    </div>
                `;
            });
        }

        function showDetails(id) {
            const game = games.find(g => g.id === id);
            const renderArea = document.getElementById('details-render');
            
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('details-page').style.display = 'block';

            renderArea.innerHTML = `
                <div class="details-flex">
                    <img src="${game.img}" class="details-img">
                    <div class="details-content">
                        <h1>${game.title}</h1>
                        <p class="category-tag">${game.category}</p>
                        <p style="color: #ccc; line-height: 1.6;">${game.desc}</p>
                        <div class="download-box">
                            <p>Download Count: <strong>${game.downloads}</strong></p>
                            <a href="${game.link}" target="_blank" class="main-dl-btn">DOWNLOAD GAME</a>
                        </div>
                    </div>
                </div>
            `;
            window.scrollTo(0,0);
        }

        function showHome() {
            document.getElementById('home-page').style.display = 'block';
            document.getElementById('details-page').style.display = 'none';
        }

        function filterGames(cat) {
            renderGames(cat);
            // Menü aktiflik durumunu güncelle
            document.querySelectorAll('.menu a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active');
            showHome();
        }

        // İlk açılışta oyunları yükle
        renderGames();
    </script>
</body>
</html>
